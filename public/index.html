<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibecoding — Node & npm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>Vibecoding</h1>
    <p class="subtitle">Версії Node.js і npm на цьому Mac</p>

    <div class="versions">
      <div class="version-box">
        <span class="label">Node.js</span>
        <span id="node-version" class="value">завантаження...</span>
      </div>
      <div class="version-box">
        <span class="label">npm</span>
        <span id="npm-version" class="value">завантаження...</span>
      </div>
    </div>

    <button id="refresh-btn">Оновити</button>
    <p class="hint">Сервер: <code>http://localhost:3000</code></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
